<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Khemka To Do's</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg-from: #f5f0e8;
  --bg-to: #e4d9c0;
  --glass: rgba(255,252,242,0.80);
  --glass-border: rgba(255,250,235,0.96);
  --glass-inner: rgba(255,250,230,0.5);
  --shadow: 0 4px 24px rgba(60,40,10,0.08), 0 1px 3px rgba(60,40,10,0.05);
  --shadow-today: 0 8px 32px rgba(80,98,35,0.24), 0 1px 3px rgba(60,40,10,0.06);
  --accent: #5b6b2f;
  --accent2: #9a7820;
  --text1: #2b1d0a;
  --text2: #7a6040;
  --text3: #b89e72;
  --done: #c4ae88;
  --divider: rgba(80,55,15,0.08);
  --r: 20px;
  --font: 'Plus Jakarta Sans', -apple-system, sans-serif;
  --serif: 'Instrument Serif', Georgia, serif;
  --wk-glass: rgba(250,240,210,0.85);
  --wk-border: rgba(180,138,55,0.35);
  --wk-shadow: 0 4px 20px rgba(160,110,30,0.16), 0 1px 3px rgba(60,40,10,0.05);
  --wk-stripe: rgba(180,138,55,0.06);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg-from: #120e06; --bg-to: #1c1508;
    --glass: rgba(30,22,8,0.90); --glass-border: rgba(220,185,100,0.09);
    --glass-inner: rgba(220,185,100,0.05);
    --shadow: 0 4px 24px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.35);
    --shadow-today: 0 8px 32px rgba(100,128,40,0.32), 0 1px 3px rgba(0,0,0,0.3);
    --accent: #8aab3c; --accent2: #c8951e;
    --text1: #f0e4c4; --text2: #9a8050; --text3: #584830;
    --done: #3e3020; --divider: rgba(220,185,100,0.07);
    --wk-glass: rgba(35,25,8,0.92); --wk-border: rgba(180,138,55,0.16);
    --wk-shadow: 0 4px 20px rgba(160,110,30,0.22), 0 1px 3px rgba(0,0,0,0.35);
    --wk-stripe: rgba(180,138,55,0.04);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;font-family:var(--font);color:var(--text1);overflow:hidden;background:var(--bg-from)}
.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(160deg,var(--bg-from) 0%,var(--bg-to) 100%)}
.blob{position:fixed;border-radius:50%;filter:blur(70px);pointer-events:none;z-index:0}
.blob1{width:280px;height:280px;top:-60px;right:-40px;background:radial-gradient(circle,rgba(91,107,47,0.22) 0%,transparent 70%)}
.blob2{width:220px;height:220px;bottom:80px;left:-60px;background:radial-gradient(circle,rgba(170,125,30,0.18) 0%,transparent 70%)}
.phone{position:relative;z-index:1;width:100%;max-width:390px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;overflow:hidden}
.hdr{padding:52px 22px 14px;flex-shrink:0}
.title{font-family:var(--serif);font-size:36px;line-height:1;color:var(--text1);letter-spacing:-0.5px}
.title-grad{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:13px;color:var(--text2);font-weight:500;margin-top:3px}
.legend{display:flex;gap:7px;margin-top:14px;align-items:center}
.pill{display:flex;align-items:center;gap:5px;background:var(--glass);border:1px solid var(--glass-border);border-radius:30px;padding:5px 11px 5px 8px;font-size:12px;font-weight:600;color:var(--text2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.pill-em{font-size:15px;line-height:1}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#b89e72;margin-left:auto;transition:background 0.3s}
.sync-dot.live{background:var(--accent)}
.sync-dot.err{background:#b03a2a}
.feed{flex:1;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding:6px 14px 140px;scroll-behavior:smooth}
.feed::-webkit-scrollbar{display:none}
.week-label{font-size:10px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--text3);padding:16px 4px 6px}
.week-label:first-child{padding-top:4px}
.card{background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r);box-shadow:var(--shadow);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);margin-bottom:10px;overflow:hidden}
.card.today{border:1.5px solid rgba(91,107,47,0.45);box-shadow:var(--shadow-today)}
.card.weekend{background:var(--wk-glass);border-color:var(--wk-border);box-shadow:var(--wk-shadow);position:relative}
.card.weekend::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,var(--wk-stripe) 0px,var(--wk-stripe) 1px,transparent 1px,transparent 18px);pointer-events:none;border-radius:var(--r);z-index:0}
.card.weekend>*{position:relative;z-index:1}
.wk-badge{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:var(--accent2);background:rgba(160,120,30,0.12);border:1px solid rgba(160,120,30,0.2);border-radius:20px;padding:2px 8px;margin-left:6px}
.card-hdr{display:flex;align-items:center;padding:14px 16px 13px;gap:10px;cursor:pointer;user-select:none}
.card-labels{flex:1;min-width:0}
.day-name{font-size:10px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--text3);display:flex;align-items:center}
.card.today .day-name{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card.weekend .day-name{color:var(--accent2);opacity:0.85}
.day-date{font-size:17px;font-weight:700;color:var(--text1);margin-top:1px;letter-spacing:-0.3px}
.card.today .day-date{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ring-wrap{position:relative;width:36px;height:36px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg);display:block}
.ring-track{fill:none;stroke:var(--divider);stroke-width:3}
.ring-fill{fill:none;stroke-width:3;stroke:url(#grad);stroke-linecap:round;transition:stroke-dashoffset 0.45s cubic-bezier(0.34,1.56,0.64,1)}
.ring-lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--text2)}
.add-btn{width:29px;height:29px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 14px rgba(80,98,35,0.35);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1);border:none}
.add-btn:active{transform:scale(0.86)}
.add-btn svg{stroke:white;fill:none;width:14px;height:14px;stroke-width:2.5;stroke-linecap:round}
.hdivider{height:1px;background:var(--divider);margin:0 14px}
.tlist{padding-bottom:2px}
.ro-banner{padding:7px 16px 9px;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.trow{position:relative;overflow:hidden}
.titem{display:flex;align-items:flex-start;gap:11px;padding:11px 16px;background:transparent;border-top:1px solid var(--divider);transition:transform 0.28s cubic-bezier(0.4,0,0.2,1);position:relative}
.titem.swiped{transform:translateX(-78px)}
.cb{width:22px;height:22px;border-radius:50%;border:1.8px solid var(--text3);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);background:transparent}
.cb.done{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;box-shadow:0 3px 10px rgba(80,98,35,0.38)}
.cb.done::after{content:'';display:block;width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:translateY(-1px) rotate(-45deg)}
.twrap{flex:1;min-width:0}
.ttext{font-size:14.5px;font-weight:500;color:var(--text1);line-height:1.4;background:transparent;border:none;outline:none;font-family:var(--font);width:100%;resize:none;white-space:pre-wrap;word-break:break-word;caret-color:var(--accent);transition:color 0.2s;display:block}
.titem.done-item .ttext{color:var(--done);text-decoration:line-through;text-decoration-color:var(--text3)}
.own-em{font-size:16px;line-height:1;flex-shrink:0;margin-top:2px}
.ro-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:9px;background:linear-gradient(135deg,var(--accent),var(--accent2))}
.del{position:absolute;right:0;top:0;width:78px;height:100%;background:linear-gradient(135deg,#b03a2a,#c45c20);display:flex;align-items:center;justify-content:center;cursor:pointer;border-top:1px solid rgba(255,255,255,0.06)}
.del svg{stroke:white;fill:none;width:18px;height:18px;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.empty-hint{display:flex;align-items:center;gap:7px;padding:11px 16px 14px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-top:1px solid var(--divider);transition:color 0.15s}
.empty-hint:active{color:var(--accent)}
.empty-hint svg{stroke:currentColor;fill:none;width:13px;height:13px;stroke-width:2.5;stroke-linecap:round}
.add-area{overflow:hidden;max-height:0;transition:max-height 0.32s cubic-bezier(0.4,0,0.2,1);border-top:1px solid transparent}
.add-area.open{max-height:120px;border-top-color:var(--divider)}
.add-inner{padding:10px 14px 13px}
.add-row{display:flex;align-items:center;gap:8px;background:var(--glass-inner);border:1px solid var(--glass-border);border-radius:14px;padding:9px 10px 9px 14px}
.add-input{flex:1;min-width:0;font-size:14.5px;font-weight:500;font-family:var(--font);background:transparent;border:none;outline:none;color:var(--text1);caret-color:var(--accent)}
.add-input::placeholder{color:var(--text3)}
.owner-toggle{display:flex;gap:3px}
.own-btn{font-size:18px;line-height:1;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;background:transparent;transition:background 0.15s,transform 0.2s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0}
.own-btn.sel{background:linear-gradient(135deg,rgba(91,107,47,0.2),rgba(154,120,32,0.2));transform:scale(1.14)}
.sub-btn{width:30px;height:30px;border-radius:50%;border:none;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 4px 12px rgba(80,98,35,0.35);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1),opacity 0.15s}
.sub-btn:disabled{opacity:0.28;box-shadow:none}
.sub-btn:not(:disabled):active{transform:scale(0.86)}
.sub-btn svg{stroke:white;fill:none;width:14px;height:14px;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
/* Loading overlay */
.loading{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg-from);gap:12px;transition:opacity 0.4s}
.loading.hidden{opacity:0;pointer-events:none}
.loading-title{font-family:var(--serif);font-size:28px;color:var(--text1)}
.loading-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.spinner{width:24px;height:24px;border:2.5px solid var(--divider);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes itemIn{from{opacity:0;transform:translateY(-8px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.new-in{animation:itemIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards}
@keyframes doneFlash{0%{background:rgba(91,107,47,0.1)}100%{background:transparent}}
.flash{animation:doneFlash 0.5s ease forwards}
</style>
</head>
<body>
<div class="bg"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<!-- Loading screen -->
<div class="loading" id="loading">
  <div class="loading-title">Khemka <span>To Do's</span></div>
  <div class="spinner"></div>
</div>

<svg width="0" height="0" style="position:absolute;pointer-events:none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b6b2f"/>
      <stop offset="100%" stop-color="#9a7820"/>
    </linearGradient>
  </defs>
</svg>

<div class="phone">
  <div class="hdr">
    <div class="title">Khemka <span class="title-grad">To Do's</span></div>
    <div class="subtitle">Your shared family canvas</div>
    <div class="legend">
      <div class="pill"><span class="pill-em">👨🏻</span> Rishab</div>
      <div class="pill"><span class="pill-em">👩🏻</span> Kimi</div>
      <div class="sync-dot" id="syncDot" title="Sync status"></div>
    </div>
  </div>
  <div class="feed" id="feed"></div>
</div>

<script>
// ── Supabase config ───────────────────────────
const SB_URL = 'https://lasypudqtqxostkzujnu.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxhc3lwdWRxdHF4b3N0a3p1am51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzcwNjQsImV4cCI6MjA5MTMxMzA2NH0.xu3b4553sa9Dxm1liz_aSLFzAUOfcBuOxm_9kzKnPpA';
const HEADERS = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

// ── REST helpers ──────────────────────────────
const api = (path, opts={}) => fetch(`${SB_URL}/rest/v1/${path}`, { headers: HEADERS, ...opts });

async function fetchTodos() {
  const r = await api('todos?select=*&order=created_at.asc');
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function insertTodo(todo) {
  const r = await api('todos', { method:'POST', body: JSON.stringify(todo) });
  if (!r.ok) throw new Error(await r.text());
  return (await r.json())[0];
}
async function updateTodo(id, patch) {
  const r = await api(`todos?id=eq.${id}`, { method:'PATCH', body: JSON.stringify(patch) });
  if (!r.ok) throw new Error(await r.text());
}
async function deleteTodo(id) {
  const r = await api(`todos?id=eq.${id}`, { method:'DELETE' });
  if (!r.ok) throw new Error(await r.text());
}

// ── Realtime via Supabase websocket ───────────
function connectRealtime(onEvent) {
  const wsUrl = `${SB_URL.replace('https','wss')}/realtime/v1/websocket?apikey=${SB_KEY}&vsn=1.0.0`;
  let ws, pingInterval;

  function connect() {
    ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      setSyncDot('live');
      ws.send(JSON.stringify({ topic:'realtime:public:todos', event:'phx_join', payload:{}, ref:'1' }));
      pingInterval = setInterval(() => ws.send(JSON.stringify({ topic:'phoenix', event:'heartbeat', payload:{}, ref:'hb' })), 25000);
    };
    ws.onmessage = e => {
      const msg = JSON.parse(e.data);
      if (msg.event === 'INSERT' || msg.event === 'UPDATE' || msg.event === 'DELETE') {
        onEvent(msg.event, msg.payload?.record, msg.payload?.old_record);
      }
    };
    ws.onclose = () => {
      setSyncDot('err');
      clearInterval(pingInterval);
      setTimeout(connect, 3000); // auto-reconnect
    };
    ws.onerror = () => { setSyncDot('err'); ws.close(); };
  }
  connect();
}

function setSyncDot(state) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state === 'live' ? ' live' : state === 'err' ? ' err' : '');
  dot.title = state === 'live' ? 'Live sync active' : state === 'err' ? 'Reconnecting…' : 'Connecting…';
}

// ── App state ─────────────────────────────────
const OWNERS = { rishab: '👨🏻', kimi: '👩🏻' };
const CIRC = 2 * Math.PI * 14;
let todos = []; // flat array from supabase
let openKey = null;

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const dKey = d => d.toISOString().slice(0,10);
const todayKey = () => dKey(TODAY);
const isWeekend = d => { const n = d.getDay(); return n===0||n===6; };

function fmtName(date) {
  const k = dKey(date);
  if (k === todayKey()) return 'Today';
  const y = new Date(TODAY); y.setDate(y.getDate()-1);
  if (k === dKey(y)) return 'Yesterday';
  const tm = new Date(TODAY); tm.setDate(tm.getDate()+1);
  if (k === dKey(tm)) return 'Tomorrow';
  return date.toLocaleDateString('en-US',{weekday:'long'});
}
const fmtDate = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric'});

function buildDays() {
  const out = [];
  for (let i=-30;i<=60;i++) { const d=new Date(TODAY); d.setDate(d.getDate()+i); out.push(d); }
  return out;
}
const days = buildDays();

// ── Rollover (client-side, writes to DB) ──────
async function rollover() {
  const tk = todayKey();
  const pastIncomplete = todos.filter(t => t.date < tk && !t.done);
  if (!pastIncomplete.length) return;

  const todayIds = new Set(todos.filter(t => t.date === tk).map(t => t.id));

  for (const t of pastIncomplete) {
    // Move to today in DB
    await updateTodo(t.id, { date: tk, rolled_from: t.rolled_from || t.date });
    t.date = tk;
    t.rolled_from = t.rolled_from || t.date;
  }
}

// ── Render ────────────────────────────────────
const feed = document.getElementById('feed');

function getTodosForDay(key) {
  return todos.filter(t => t.date === key);
}

function render() {
  const prev = feed.scrollTop;
  feed.innerHTML = '';
  let lastWknd = null;

  days.forEach(date => {
    const key = dKey(date);
    const isToday = key === todayKey();
    const wknd = isWeekend(date);
    const dayTodos = getTodosForDay(key);
    const doneCount = dayTodos.filter(t=>t.done).length;
    const rolled = dayTodos.filter(t=>t.rolled_from);

    if (lastWknd !== wknd) {
      const lbl = document.createElement('div');
      lbl.className = 'week-label';
      lbl.textContent = wknd ? '🌿 Weekend' : '📋 Weekdays';
      feed.appendChild(lbl);
    }
    lastWknd = wknd;

    const card = document.createElement('div');
    card.className = 'card' + (isToday?' today':'') + (wknd&&!isToday?' weekend':'');
    card.dataset.key = key;

    // Header
    const hdr = document.createElement('div'); hdr.className = 'card-hdr';
    const labels = document.createElement('div'); labels.className = 'card-labels';
    const nameRow = document.createElement('div');
    nameRow.style.cssText = 'display:flex;align-items:center';
    const dn = document.createElement('div'); dn.className = 'day-name'; dn.textContent = fmtName(date);
    nameRow.appendChild(dn);
    if (wknd && !isToday) {
      const badge = document.createElement('span'); badge.className = 'wk-badge';
      badge.textContent = date.getDay()===6?'Sat':'Sun';
      nameRow.appendChild(badge);
    }
    labels.appendChild(nameRow);
    const dd = document.createElement('div'); dd.className = 'day-date'; dd.textContent = fmtDate(date);
    labels.appendChild(dd);
    const addBtn = document.createElement('button'); addBtn.className = 'add-btn';
    addBtn.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>`;
    addBtn.addEventListener('click', e => { e.stopPropagation(); toggleAdd(key,card); });
    hdr.appendChild(labels); hdr.appendChild(makeRing(doneCount,dayTodos.length)); hdr.appendChild(addBtn);
    hdr.addEventListener('click', () => toggleAdd(key,card));
    card.appendChild(hdr);

    if (isToday && rolled.length>0) {
      const b = document.createElement('div'); b.className = 'ro-banner';
      b.textContent = `↓ ${rolled.length} carried over`; card.appendChild(b);
    }
    if (dayTodos.length>0) { const dv=document.createElement('div'); dv.className='hdivider'; card.appendChild(dv); }
    const list = document.createElement('div'); list.className='tlist'; card.appendChild(list);
    if (dayTodos.length===0) { list.appendChild(mkEmptyHint(key,card)); }
    else { dayTodos.forEach(t => list.appendChild(mkRow(t,key))); }

    const aa = mkAddArea(key);
    if (openKey===key) aa.classList.add('open');
    card.appendChild(aa);
    feed.appendChild(card);
  });

  if (prev>0) { feed.scrollTop=prev; }
  else { scrollToToday(); }
}

function scrollToToday() {
  setTimeout(() => {
    const tc = feed.querySelector('.card.today');
    if (!tc) return;
    // Position today card near top with a little breathing room
    const feedRect = feed.getBoundingClientRect();
    const cardRect = tc.getBoundingClientRect();
    feed.scrollTop += cardRect.top - feedRect.top - 12;
  }, 50);
}

function makeRing(done, total) {
  const offset = total===0 ? CIRC : CIRC*(1-done/total);
  const label = total===0 ? '' : `${done}/${total}`;
  const w = document.createElement('div'); w.className='ring-wrap';
  w.innerHTML=`<svg width="36" height="36" viewBox="0 0 36 36"><circle class="ring-track" cx="18" cy="18" r="14"/><circle class="ring-fill" cx="18" cy="18" r="14" stroke-dasharray="${CIRC.toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/></svg><div class="ring-lbl">${label}</div>`;
  return w;
}

function mkDiv() { const d=document.createElement('div'); d.className='hdivider'; return d; }

function mkEmptyHint(key, card) {
  const h=document.createElement('div'); h.className='empty-hint';
  h.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Tap to add a task`;
  h.addEventListener('click',()=>toggleAdd(key,card)); return h;
}

function mkRow(todo, key) {
  const row=document.createElement('div'); row.className='trow'; row.dataset.id=todo.id;
  const del=document.createElement('div'); del.className='del';
  del.innerHTML=`<svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/></svg>`;
  del.addEventListener('click',()=>doDelete(todo.id,row)); row.appendChild(del);
  const item=document.createElement('div');
  item.className='titem'+(todo.done?' done-item':''); item.dataset.id=todo.id;
  const cb=document.createElement('div'); cb.className='cb'+(todo.done?' done':'');
  cb.addEventListener('click',e=>{e.stopPropagation();doToggle(todo.id,key);});
  const wrap=document.createElement('div'); wrap.className='twrap';
  const ta=document.createElement('textarea');
  ta.className='ttext'; ta.value=todo.text; ta.rows=1; ta.spellcheck=true; ta.style.height='auto';
  ta.addEventListener('input',()=>{ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; saveText(todo.id,ta.value); });
  ta.addEventListener('focus',()=>item.classList.remove('swiped'));
  setTimeout(()=>{ ta.style.height='auto'; ta.style.height=ta.scrollHeight+'px'; },0);
  wrap.appendChild(ta);
  item.appendChild(cb); item.appendChild(wrap);
  if (todo.rolled_from) { const dot=document.createElement('div'); dot.className='ro-dot'; item.appendChild(dot); }
  const em=document.createElement('div'); em.className='own-em'; em.textContent=OWNERS[todo.owner]||'👨🏻';
  item.appendChild(em);
  let sx=0;
  item.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
  item.addEventListener('touchmove',e=>{
    const dx=e.touches[0].clientX-sx;
    if(dx<-8) item.style.transform=`translateX(${Math.max(dx,-78)}px)`;
    else if(dx>8&&item.classList.contains('swiped')) item.style.transform=`translateX(${Math.min(dx-78,0)}px)`;
  },{passive:true});
  item.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx; item.style.transform='';
    dx<-44?item.classList.add('swiped'):item.classList.remove('swiped');
  });
  row.appendChild(item); return row;
}

function mkAddArea(key) {
  let selOwner='rishab';
  const area=document.createElement('div'); area.className='add-area';
  const inner=document.createElement('div'); inner.className='add-inner';
  const row=document.createElement('div'); row.className='add-row';
  const inp=document.createElement('input');
  inp.className='add-input'; inp.type='text'; inp.placeholder='What needs doing?'; inp.autocomplete='off';
  const toggle=document.createElement('div'); toggle.className='owner-toggle';
  const bR=document.createElement('button'); bR.className='own-btn sel'; bR.textContent='👨🏻'; bR.dataset.o='rishab';
  const bK=document.createElement('button'); bK.className='own-btn'; bK.textContent='👩🏻'; bK.dataset.o='kimi';
  toggle.appendChild(bR); toggle.appendChild(bK);
  const sub=document.createElement('button'); sub.className='sub-btn'; sub.disabled=true;
  sub.innerHTML=`<svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>`;
  inp.addEventListener('input',()=>sub.disabled=!inp.value.trim());
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();doAdd(key,inp,selOwner);}});
  sub.addEventListener('click',()=>doAdd(key,inp,selOwner));
  [bR,bK].forEach(b=>b.addEventListener('click',()=>{
    selOwner=b.dataset.o;
    bR.classList.toggle('sel',selOwner==='rishab');
    bK.classList.toggle('sel',selOwner==='kimi');
  }));
  row.appendChild(inp); row.appendChild(toggle); row.appendChild(sub);
  inner.appendChild(row); area.appendChild(inner); return area;
}

// ── Actions ───────────────────────────────────
function toggleAdd(key, card) {
  const area=card.querySelector('.add-area');
  const isOpen=area.classList.contains('open');
  if (openKey&&openKey!==key) {
    const prev=feed.querySelector(`[data-key="${openKey}"] .add-area`);
    if(prev) prev.classList.remove('open');
  }
  if(isOpen){area.classList.remove('open');openKey=null;return;}
  area.classList.add('open'); openKey=key;
  setTimeout(()=>{const i=area.querySelector('.add-input');if(i)i.focus();},260);
}

async function doAdd(key, inp, owner) {
  const text=inp.value.trim(); if(!text) return;
  inp.value=''; inp.dispatchEvent(new Event('input'));
  const newTodo = { date:key, text, owner, done:false, rolled_from:null };
  try {
    const saved = await insertTodo(newTodo);
    todos.push(saved);
    // Optimistic UI
    const card=feed.querySelector(`[data-key="${key}"]`); if(!card) return;
    const list=card.querySelector('.tlist');
    const hint=list.querySelector('.empty-hint');
    if(hint){hint.remove(); card.insertBefore(mkDiv(),list);}
    const newRow=mkRow(saved,key); newRow.classList.add('new-in');
    list.appendChild(newRow); refreshRing(key,card);
    setTimeout(()=>{
      const a=card.querySelector('.add-area');
      if(a){a.classList.add('open');openKey=key;}
      const i=card.querySelector('.add-input'); if(i) i.focus();
    },40);
  } catch(e) { console.error('Add failed',e); }
}

async function doToggle(id, key) {
  const todo=todos.find(t=>t.id===id); if(!todo) return;
  todo.done=!todo.done;
  const item=feed.querySelector(`.titem[data-id="${id}"]`);
  if(item){
    item.classList.toggle('done-item',todo.done);
    const cb=item.querySelector('.cb'); if(cb) cb.classList.toggle('done',todo.done);
    item.classList.add('flash');
    item.addEventListener('animationend',()=>item.classList.remove('flash'),{once:true});
  }
  const card=feed.querySelector(`[data-key="${key}"]`); if(card) refreshRing(key,card);
  try { await updateTodo(id,{done:todo.done}); } catch(e) { todo.done=!todo.done; render(); }
}

async function doDelete(id, row) {
  const todo=todos.find(t=>t.id===id); if(!todo) return;
  const key=todo.date;
  todos=todos.filter(t=>t.id!==id);
  const h=row.offsetHeight;
  row.style.transition='opacity 0.2s,max-height 0.25s ease';
  row.style.overflow='hidden'; row.style.maxHeight=h+'px'; row.style.opacity='0';
  requestAnimationFrame(()=>row.style.maxHeight='0');
  setTimeout(()=>{
    row.remove();
    const card=feed.querySelector(`[data-key="${key}"]`); if(!card) return;
    refreshRing(key,card);
    const list=card.querySelector('.tlist');
    if(list&&list.children.length===0){
      const dv=card.querySelector('.hdivider'); if(dv) dv.remove();
      list.appendChild(mkEmptyHint(key,card));
    }
  },270);
  try { await deleteTodo(id); } catch(e) { console.error('Delete failed',e); render(); }
}

let saveTimers={};
function saveText(id, text) {
  clearTimeout(saveTimers[id]);
  saveTimers[id]=setTimeout(async()=>{
    const todo=todos.find(t=>t.id===id); if(todo) todo.text=text;
    try { await updateTodo(id,{text}); } catch(e){console.error('Save text failed',e);}
  },600);
}

function refreshRing(key, card) {
  const dayTodos=getTodosForDay(key);
  const done=dayTodos.filter(t=>t.done).length;
  const old=card.querySelector('.ring-wrap'); if(old) old.replaceWith(makeRing(done,dayTodos.length));
}

// ── Realtime event handler ────────────────────
function handleRealtimeEvent(event, record, oldRecord) {
  if (event==='INSERT') {
    if (!todos.find(t=>t.id===record.id)) {
      todos.push(record);
      // Add to UI without full re-render
      const key=record.date;
      const card=feed.querySelector(`[data-key="${key}"]`); if(!card) return;
      const list=card.querySelector('.tlist');
      const hint=list.querySelector('.empty-hint');
      if(hint){hint.remove(); card.insertBefore(mkDiv(),list);}
      const newRow=mkRow(record,key); newRow.classList.add('new-in');
      list.appendChild(newRow); refreshRing(key,card);
    }
  } else if (event==='UPDATE') {
    const idx=todos.findIndex(t=>t.id===record.id);
    if(idx>=0) {
      const key=todos[idx].date;
      todos[idx]={...todos[idx],...record};
      // Refresh the specific item
      const item=feed.querySelector(`.titem[data-id="${record.id}"]`);
      if(item){
        item.classList.toggle('done-item',record.done);
        const cb=item.querySelector('.cb'); if(cb) cb.classList.toggle('done',record.done);
        const ta=item.querySelector('.ttext'); if(ta&&document.activeElement!==ta) ta.value=record.text;
      }
      const card=feed.querySelector(`[data-key="${key}"]`); if(card) refreshRing(key,card);
    }
  } else if (event==='DELETE') {
    const id=oldRecord?.id; if(!id) return;
    const todo=todos.find(t=>t.id===id); if(!todo) return;
    const key=todo.date;
    todos=todos.filter(t=>t.id!==id);
    const row=feed.querySelector(`.trow[data-id="${id}"]`);
    if(row){
      row.style.transition='opacity 0.15s'; row.style.opacity='0';
      setTimeout(()=>{
        row.remove();
        const card=feed.querySelector(`[data-key="${key}"]`); if(!card) return;
        refreshRing(key,card);
        const list=card.querySelector('.tlist');
        if(list&&list.children.length===0){
          const dv=card.querySelector('.hdivider'); if(dv) dv.remove();
          list.appendChild(mkEmptyHint(key,card));
        }
      },150);
    }
  }
}

// ── Boot ──────────────────────────────────────
async function boot() {
  try {
    todos = await fetchTodos();
    await rollover();
    render();
    connectRealtime(handleRealtimeEvent);
  } catch(e) {
    console.error('Boot failed', e);
    setSyncDot('err');
    render(); // still render empty UI
  }
  // Hide loading screen
  const loading=document.getElementById('loading');
  loading.classList.add('hidden');
  setTimeout(()=>loading.style.display='none',400);
}

boot();
</script>
